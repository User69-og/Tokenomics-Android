name: tokenomics
description: "Track AI token usage across multiple accounts"
publish_to: 'none'
version: 1.0.1+2

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navigation
  go_router: ^14.6.3

  # Secure storage (Android Keystore)
  flutter_secure_storage: ^9.2.4

  # Local persistence
  shared_preferences: ^2.3.3

  # HTTP client
  dio: ^5.10.0

  # Data models
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # Utilities
  uuid: ^4.5.1
  intl: ^0.20.2
  url_launcher: ^6.3.0
  flutter_inappwebview: ^6.1.5
  flutter_local_notifications: ^22.1.0
  firebase_core: ^4.12.1
  firebase_database: ^12.4.6
  permission_handler: ^12.0.3
  timezone: ^0.11.1
  flutter_timezone: ^5.1.0
  package_info_plus: ^9.0.1
  path_provider: ^2.1.6
  open_filex: ^4.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # Code generation
  build_runner: ^2.4.13
  freezed: ^2.5.7
  json_serializable: ^6.9.2
  riverpod_generator: ^2.6.3

  flutter_launcher_icons: ^0.14.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: false
  image_path: "assets/icon.png"
  min_sdk_size: 21

flutter:
  uses-material-design: true

  assets:
    - assets/icon.png
